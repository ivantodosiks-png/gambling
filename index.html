<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Auth</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: radial-gradient(1200px 600px at 20% 0%, rgba(51,209,143,0.18), transparent 60%), #0b1020; color: #e9edf7; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { width: min(520px, 100%); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 22px; }
      .tabs { display: flex; gap: 10px; margin-bottom: 16px; }
      .tab { flex: 1; cursor: pointer; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: #e9edf7; padding: 10px 12px; border-radius: 12px; font-weight: 700; }
      .tab.active { border-color: rgba(51,209,143,0.6); box-shadow: 0 0 0 3px rgba(51,209,143,0.14) inset; }
      label { display: block; margin: 10px 0 6px; color: rgba(233, 237, 247, 0.75); font-size: 13px; }
      input { width: 100%; box-sizing: border-box; padding: 11px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: #e9edf7; }
      input:focus { outline: none; border-color: rgba(125, 211, 252, 0.55); box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.14); }
      button.primary { margin-top: 14px; width: 100%; cursor: pointer; border: 0; padding: 11px 14px; border-radius: 10px; background: #33d18f; color: #07110c; font-weight: 800; }
      .msg { margin-top: 12px; min-height: 18px; font-size: 13px; color: rgba(233, 237, 247, 0.8); }
      .err { color: #ff6b6b; }
      .ok { color: #33d18f; }
      .muted { color: rgba(233, 237, 247, 0.7); font-size: 13px; margin-top: 10px; }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2 style="margin:0 0 6px;">Register / Login</h2>
        <div class="muted">Supabase Auth (email + password). No manual password storage.</div>

        <div class="tabs" style="margin-top:16px;">
          <button class="tab active" id="tabLogin" type="button">Login</button>
          <button class="tab" id="tabRegister" type="button">Register</button>
        </div>

        <form id="form" autocomplete="off">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input id="password" type="password" placeholder="at least 6 characters" required />

          <button class="primary" id="submitBtn" type="submit">Login</button>
          <div class="msg" id="msg"></div>
        </form>

        <div class="muted">Keys setup: see <code>supabase-config.js</code> and <code>supabase.js</code>.</div>
      </div>
    </div>

    <!-- Local (node server.js): /supabase-config.js from .env. On Vercel it can be 404 (ok). -->
    <script src="/supabase-config.js"></script>
    <!-- For Vercel/static: put keys into supabase-config.js -->
    <script src="./supabase-config.js"></script>
    <!-- Supabase JS SDK (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <!-- Creates window.sb -->
    <script src="./supabase.js"></script>
    <script src="./maintenance.js"></script>
    <script>
      const tabLogin = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");
      const form = document.getElementById("form");
      const submitBtn = document.getElementById("submitBtn");
      const msg = document.getElementById("msg");
      const emailEl = document.getElementById("email");
      const passEl = document.getElementById("password");

      let mode = "login"; // "login" | "register"

      function setMode(next) {
        mode = next;
        tabLogin.classList.toggle("active", mode === "login");
        tabRegister.classList.toggle("active", mode === "register");
        submitBtn.textContent = mode === "login" ? "Login" : "Register";
        msg.textContent = "";
        msg.className = "msg";
      }

      function setError(text) {
        msg.textContent = text;
        msg.className = "msg err";
      }

      function setOk(text) {
        msg.textContent = text;
        msg.className = "msg ok";
      }

      tabLogin.addEventListener("click", () => setMode("login"));
      tabRegister.addEventListener("click", () => setMode("register"));

      async function goIfAuthed() {
        if (!window.sb) return;
        const { data } = await window.sb.auth.getSession();
        if (data.session) window.location.href = "./dashboard.html";
      }

      (async () => {
        // Maintenance mode blocks everyone except admins with an active session.
        if (window.maintenanceGuard) {
          const blocked = await window.maintenanceGuard(window.sb);
          if (blocked) return;
        }
        await goIfAuthed();
      })();

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!window.sb) return setError("Supabase is not configured. Fill url/anonKey in `supabase-config.js` and redeploy.");

        const email = emailEl.value.trim();
        const password = passEl.value;
        if (!email || !password) return setError("Enter email and password");

        submitBtn.disabled = true;
        submitBtn.textContent = "Please wait...";
        msg.textContent = "";
        msg.className = "msg";

        try {
          if (mode === "register") {
            const { data, error } = await window.sb.auth.signUp({ email, password });
            if (error) throw error;

            // After register: switch to login.
            setMode("login");
            passEl.value = "";

            // If email confirmation is enabled, session may be null.
            const needsConfirm = !data?.session;
            setOk(needsConfirm
              ? "Account created. Check your email and confirm it, then login."
              : "Account created. Now login.");
          } else {
            const { error } = await window.sb.auth.signInWithPassword({ email, password });
            if (error) throw error;
            window.location.href = "./site.html";
          }
        } catch (err) {
          setError(err?.message || "Error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = mode === "login" ? "Login" : "Register";
        }
      });

      // If login happens in another tab, redirect.
      if (!window.sb) {
        setError("No Supabase connection. Check `supabase-config.js` and keys.");
      } else {
        window.sb.auth.onAuthStateChange((_event, session) => {
          if (session) window.location.href = "./site.html";
        });
      }
    </script>
  </body>
</html>
