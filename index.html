<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Auth</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: radial-gradient(1200px 600px at 20% 0%, rgba(51,209,143,0.18), transparent 60%), #0b1020; color: #e9edf7; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { width: min(520px, 100%); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 22px; }
      .tabs { display: flex; gap: 10px; margin-bottom: 16px; }
      .tab { flex: 1; cursor: pointer; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: #e9edf7; padding: 10px 12px; border-radius: 12px; font-weight: 700; }
      .tab.active { border-color: rgba(51,209,143,0.6); box-shadow: 0 0 0 3px rgba(51,209,143,0.14) inset; }
      label { display: block; margin: 10px 0 6px; color: rgba(233, 237, 247, 0.75); font-size: 13px; }
      input { width: 100%; box-sizing: border-box; padding: 11px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: #e9edf7; }
      input:focus { outline: none; border-color: rgba(125, 211, 252, 0.55); box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.14); }
      button.primary { margin-top: 14px; width: 100%; cursor: pointer; border: 0; padding: 11px 14px; border-radius: 10px; background: #33d18f; color: #07110c; font-weight: 800; }
      .msg { margin-top: 12px; min-height: 18px; font-size: 13px; color: rgba(233, 237, 247, 0.8); }
      .err { color: #ff6b6b; }
      .ok { color: #33d18f; }
      .muted { color: rgba(233, 237, 247, 0.7); font-size: 13px; margin-top: 10px; }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2 style="margin:0 0 6px;">Регистрация / Логин</h2>
        <div class="muted">Supabase Auth (email + password). Пароли вручную не храним.</div>

        <div class="tabs" style="margin-top:16px;">
          <button class="tab active" id="tabLogin" type="button">Login</button>
          <button class="tab" id="tabRegister" type="button">Register</button>
        </div>

        <form id="form" autocomplete="off">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input id="password" type="password" placeholder="минимум 6 символов" required />

          <button class="primary" id="submitBtn" type="submit">Login</button>
          <div class="msg" id="msg"></div>
        </form>

        <div class="muted">
          Настройка ключей: смотри `supabase.js` и `.env` (сервер отдаёт `/supabase-config.js`).
        </div>
      </div>
    </div>

    <!-- Этот файл генерится сервером (server.js) из .env -->
    <script src="/supabase-config.js"></script>
    <script type="module">
      import { supabase } from "./supabase.js";

      const tabLogin = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");
      const form = document.getElementById("form");
      const submitBtn = document.getElementById("submitBtn");
      const msg = document.getElementById("msg");
      const emailEl = document.getElementById("email");
      const passEl = document.getElementById("password");

      let mode = "login"; // "login" | "register"

      function setMode(next) {
        mode = next;
        tabLogin.classList.toggle("active", mode === "login");
        tabRegister.classList.toggle("active", mode === "register");
        submitBtn.textContent = mode === "login" ? "Login" : "Register";
        msg.textContent = "";
        msg.className = "msg";
      }

      function setError(text) {
        msg.textContent = text;
        msg.className = "msg err";
      }

      function setOk(text) {
        msg.textContent = text;
        msg.className = "msg ok";
      }

      tabLogin.addEventListener("click", () => setMode("login"));
      tabRegister.addEventListener("click", () => setMode("register"));

      // Если ключи не подгрузились, сразу показываем понятную ошибку.
      if (!window.__SUPABASE__?.url || !window.__SUPABASE__?.anonKey) {
        setError("Нет ключей Supabase. Проверь SUPABASE_URL и SUPABASE_ANON_KEY в .env и что сайт запущен через server.js");
        submitBtn.disabled = true;
      }

      async function goIfAuthed() {
        const { data } = await supabase.auth.getSession();
        if (data.session) window.location.href = "./dashboard.html";
      }

      await goIfAuthed();

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = emailEl.value.trim();
        const password = passEl.value;
        if (!email || !password) return setError("Введите email и пароль");

        submitBtn.disabled = true;
        submitBtn.textContent = "Подожди...";
        msg.textContent = "";
        msg.className = "msg";

        try {
          if (mode === "register") {
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) throw error;

            // После регистрации: переключаем на логин (как ты просил).
            setMode("login");
            passEl.value = "";

            // Если включено подтверждение email, логин не сработает пока не подтвердить.
            const needsConfirm = !data?.session;
            setOk(needsConfirm
              ? "Аккаунт создан. Проверь почту и подтверди email, потом логинься."
              : "Аккаунт создан. Теперь залогинься.");
          } else {
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            window.location.href = "./dashboard.html";
          }
        } catch (err) {
          setError(err?.message || "Ошибка");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = mode === "login" ? "Login" : "Register";
        }
      });

      // Если логин произошёл в другой вкладке — отправляем на dashboard.
      supabase.auth.onAuthStateChange((_event, session) => {
        if (session) window.location.href = "./dashboard.html";
      });
    </script>
  </body>
</html>
