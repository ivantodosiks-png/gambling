<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supabase Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background:
          radial-gradient(1100px 680px at 18% 0%, rgba(168,85,255,0.22), transparent 60%),
          radial-gradient(980px 640px at 90% 10%, rgba(0,234,255,0.14), transparent 55%),
          linear-gradient(180deg, #0b0014, #140028 52%, #1a0033);
        color: rgba(245,246,255,0.92);
      }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card {
        width: min(520px, 100%);
        background: linear-gradient(180deg, rgba(16,0,34,0.70), rgba(10,0,24,0.56));
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 26px 80px rgba(0,0,0,0.62), 0 0 0 1px rgba(168,85,255,0.12);
        backdrop-filter: blur(14px);
      }
      .tabs { display: flex; gap: 10px; margin-bottom: 16px; }
      .tab {
        flex: 1;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.04);
        color: rgba(245,246,255,0.92);
        padding: 10px 12px;
        border-radius: 12px;
        font-weight: 900;
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }
      .tab:hover { transform: translateY(-1px); box-shadow: 0 0 0 1px rgba(0,234,255,0.16), 0 0 30px rgba(0,234,255,0.10); border-color: rgba(0,234,255,0.22); }
      .tab.active { border-color: rgba(168,85,255,0.55); box-shadow: 0 0 0 3px rgba(168,85,255,0.14) inset, 0 0 0 1px rgba(168,85,255,0.12); }
      label { display: block; margin: 10px 0 6px; color: rgba(245,246,255,0.70); font-size: 13px; font-weight: 800; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.04);
        color: rgba(245,246,255,0.92);
        font-weight: 800;
      }
      input:focus { outline: none; border-color: rgba(0,234,255,0.45); box-shadow: 0 0 0 3px rgba(0,234,255,0.14); }
      button.primary {
        margin-top: 14px;
        width: 100%;
        cursor: pointer;
        border: 0;
        padding: 11px 14px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(168,85,255,0.98), rgba(124,58,237,0.96));
        color: rgba(255,255,255,0.96);
        font-weight: 1000;
        box-shadow: 0 18px 60px rgba(168,85,255,0.16);
        transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
      }
      button.primary:hover { filter: brightness(1.05); box-shadow: 0 18px 60px rgba(168,85,255,0.20), 0 0 0 1px rgba(168,85,255,0.12); transform: translateY(-1px); }
      button.primary:active { transform: translateY(0); }
      .msg { margin-top: 12px; min-height: 18px; font-size: 13px; color: rgba(245, 246, 255, 0.82); }
      .err { color: #ff3b3b; }
      .ok { color: #00ff88; }
      .muted { color: rgba(245, 246, 255, 0.66); font-size: 13px; margin-top: 10px; }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.10); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h2 style="margin:0 0 6px;">Register / Login</h2>
        <div class="muted">Supabase Auth (email + password). No manual password storage.</div>

        <div class="tabs" style="margin-top:16px;">
          <button class="tab active" id="tabLogin" type="button">Login</button>
          <button class="tab" id="tabRegister" type="button">Register</button>
        </div>

        <form id="form" autocomplete="off">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input id="password" type="password" placeholder="at least 6 characters" required />

          <button class="primary" id="submitBtn" type="submit">Login</button>
          <div class="msg" id="msg"></div>
        </form>

        <div class="muted">Keys setup: see <code>supabase-config.js</code> and <code>supabase.js</code>.</div>
      </div>
    </div>

    <!-- Local (node server.js): /supabase-config.js from .env. On Vercel it can be 404 (ok). -->
    <script src="/supabase-config.js"></script>
    <!-- For Vercel/static: put keys into supabase-config.js -->
    <script src="./supabase-config.js"></script>
    <!-- Supabase JS SDK (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <!-- Creates window.sb -->
    <script src="./supabase.js"></script>
    <script src="./maintenance.js"></script>
    <script>
      const tabLogin = document.getElementById("tabLogin");
      const tabRegister = document.getElementById("tabRegister");
      const form = document.getElementById("form");
      const submitBtn = document.getElementById("submitBtn");
      const msg = document.getElementById("msg");
      const emailEl = document.getElementById("email");
      const passEl = document.getElementById("password");

      let mode = "login"; // "login" | "register"

      function setMode(next) {
        mode = next;
        tabLogin.classList.toggle("active", mode === "login");
        tabRegister.classList.toggle("active", mode === "register");
        submitBtn.textContent = mode === "login" ? "Login" : "Register";
        msg.textContent = "";
        msg.className = "msg";
      }

      function setError(text) {
        msg.textContent = text;
        msg.className = "msg err";
      }

      function setOk(text) {
        msg.textContent = text;
        msg.className = "msg ok";
      }

      tabLogin.addEventListener("click", () => setMode("login"));
      tabRegister.addEventListener("click", () => setMode("register"));

      async function goIfAuthed() {
        if (!window.sb) return;
        const { data } = await window.sb.auth.getSession();
        if (data.session) window.location.href = "./dashboard.html";
      }

      (async () => {
        // Maintenance mode blocks everyone except admins with an active session.
        if (window.maintenanceGuard) {
          const blocked = await window.maintenanceGuard(window.sb);
          if (blocked) return;
        }
        await goIfAuthed();
      })();

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!window.sb) return setError("Supabase is not configured. Fill url/anonKey in `supabase-config.js` and redeploy.");

        const email = emailEl.value.trim();
        const password = passEl.value;
        if (!email || !password) return setError("Enter email and password");

        submitBtn.disabled = true;
        submitBtn.textContent = "Please wait...";
        msg.textContent = "";
        msg.className = "msg";

        try {
          if (mode === "register") {
            const { data, error } = await window.sb.auth.signUp({ email, password });
            if (error) throw error;

            // After register: switch to login.
            setMode("login");
            passEl.value = "";

            // If email confirmation is enabled, session may be null.
            const needsConfirm = !data?.session;
            setOk(needsConfirm
              ? "Account created. Check your email and confirm it, then login."
              : "Account created. Now login.");
          } else {
            const { error } = await window.sb.auth.signInWithPassword({ email, password });
            if (error) throw error;
            window.location.href = "./site.html";
          }
        } catch (err) {
          setError(err?.message || "Error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = mode === "login" ? "Login" : "Register";
        }
      });

      // If login happens in another tab, redirect.
      if (!window.sb) {
        setError("No Supabase connection. Check `supabase-config.js` and keys.");
      } else {
        window.sb.auth.onAuthStateChange((_event, session) => {
          if (session) window.location.href = "./site.html";
        });
      }
    </script>
  </body>
</html>
