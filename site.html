<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0b1020; color: #e9edf7; }
      header { position: sticky; top: 0; background: rgba(11,16,32,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.12); }
      .wrap { max-width: 980px; margin: 0 auto; padding: 18px 16px; }
      .row { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
      .muted { color: rgba(233, 237, 247, 0.7); font-size: 13px; }
      button { cursor: pointer; border: 0; padding: 10px 12px; border-radius: 10px; background: #33d18f; color: #07110c; font-weight: 800; }
      button.secondary { background: rgba(255,255,255,0.08); color: #e9edf7; border: 1px solid rgba(255,255,255,0.14); }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 6px; }
      a { color: #7dd3fc; }
      .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 18px; }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="row">
          <div>
            <div style="font-weight:900; font-size:18px;">Site</div>
            <div class="muted">ID: <code id="userId">-</code></div>
          </div>
          <div class="row" style="justify-content:flex-end;">
            <button id="toDashboardBtn" class="secondary" type="button">Profile</button>
            <button id="toAdminBtn" class="secondary" type="button" style="display:none;">Admin</button>
            <button id="logoutBtn" type="button">Logout</button>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="card">
        <h2 style="margin:0 0 8px;">Welcome</h2>
        <div class="muted" style="margin-bottom:12px;">This is the main site page after login. Put your content/game here.</div>
        <div class="muted">Email: <span id="email">-</span></div>
        <div class="muted" style="margin-top:8px;">Balance: <span id="balance">-</span></div>
        <div class="muted" id="balanceHint" style="margin-top:8px;"></div>
      </div>
    </main>

    <script src="/supabase-config.js"></script>
    <script src="./supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./supabase.js"></script>
    <script>
      (async () => {
        const sb = window.sb;
        if (!sb) {
          window.location.href = "./index.html";
          return;
        }

        const { data } = await sb.auth.getSession();
        if (!data.session) {
          window.location.href = "./index.html";
          return;
        }

        const user = data.session.user;
        document.getElementById("userId").textContent = user.id;
        document.getElementById("email").textContent = user.email || "-";

        // Пытаемся показать balance из profiles (если колонка есть).
        const balanceEl = document.getElementById("balance");
        const hintEl = document.getElementById("balanceHint");
        try {
          const { data: profile, error } = await sb
            .from("profiles")
            .select("balance")
            .eq("id", user.id)
            .maybeSingle();

          if (error) throw error;
          balanceEl.textContent = profile?.balance ?? "-";
        } catch (e) {
          const msg = e?.message || "";
          if (msg.includes("column") && msg.includes("balance") && msg.includes("does not exist")) {
            hintEl.textContent =
              "Missing balance column. Run SQL: ALTER TABLE public.profiles ADD COLUMN balance bigint NOT NULL DEFAULT 5000;";
          } else {
            hintEl.textContent = msg ? `Balance error: ${msg}` : "Balance error";
          }
          balanceEl.textContent = "-";
        }

        // Показываем кнопку Админка, если ты админ.
        try {
          const { data: isAdmin } = await sb.rpc("is_admin");
          if (isAdmin) document.getElementById("toAdminBtn").style.display = "inline-block";
        } catch (_) {}

        document.getElementById("toDashboardBtn").addEventListener("click", () => {
          window.location.href = "./dashboard.html";
        });
        document.getElementById("toAdminBtn").addEventListener("click", () => {
          window.location.href = "./admin.html";
        });
        document.getElementById("logoutBtn").addEventListener("click", async () => {
          await sb.auth.signOut();
          window.location.href = "./index.html";
        });

        sb.auth.onAuthStateChange((_event, session) => {
          if (!session) window.location.href = "./index.html";
        });
      })();
    </script>
  </body>
</html>
