<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivan Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./site.css" />
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="row">
          <div class="brand">
            <div class="logo">G</div>
            <div>
              <div style="font-weight:1000; font-size:16px; line-height:1;">Ivan Simulator</div>
              <div class="muted">Roulette + Mines (virtual coins only)</div>
            </div>
          </div>
          <div class="top-actions">
            <div class="pill">Balance: <span id="balanceValue">0</span></div>
            <div class="pill">ID: <code id="userIdValue">-</code></div>
            <button id="profileBtn" class="ghost" type="button">Profile</button>
            <button id="adminBtn" class="ghost" type="button" style="display:none;">Admin</button>
            <button id="logoutBtn" type="button">Logout</button>
          </div>
        </div>

        <div class="tabs">
          <button id="tab_rouletteView" class="tab active" type="button">Roulette</button>
          <button id="tab_minesView" class="tab" type="button">Mines</button>
        </div>
      </div>
    </header>

    <main>
      <div class="wrap">
        <div id="globalMsg" class="msg"></div>
        <section id="rouletteView" class="view active">
          <div class="card">
            <div class="roulette-layout">
              <aside class="roulette-panel">
                <div>
                  <h2 style="margin:0 0 4px;">Roulette</h2>
                  <div class="muted">Virtual coins only.</div>
                </div>

                <div class="panel-block">
                  <div class="lbl">Chip value</div>
                  <div class="chip-row" id="rouletteChipRow">
                    <button type="button" class="chipv active" data-chip="10">10</button>
                    <button type="button" class="chipv" data-chip="100">100</button>
                    <button type="button" class="chipv" data-chip="1000">1k</button>
                    <button type="button" class="chipv" data-chip="5000">5k</button>
                    <button type="button" class="chipv" data-chip="10000">10k</button>
                  </div>
                  <div class="betbox" style="margin-top:10px;">
                    <input id="rouletteChipInput" inputmode="numeric" value="10" />
                    <div class="bet-actions">
                      <button id="rouletteChipHalf" class="chip" type="button">1/2</button>
                      <button id="rouletteChipDouble" class="chip" type="button">2x</button>
                    </div>
                  </div>
                  <div class="muted tiny" style="margin-top:6px;">Click a spot on the table to place a chip.</div>
                </div>

                <div class="panel-block">
                  <div class="minirow">
                    <div class="muted">Total bet</div>
                    <div class="strong" id="rouletteTotalBet">0</div>
                  </div>
                  <div class="minirow">
                    <div class="muted">Bets</div>
                    <div class="strong" id="rouletteBetsCount">0</div>
                  </div>
                </div>

                <button id="rouletteSpinBtn" class="primary-wide" type="button">Spin</button>
                <button id="rouletteClearBtn" class="secondary-wide" type="button">Clear bets</button>

                <div class="msg" id="rouletteMsg"></div>
                <div class="muted" style="margin-top:8px;">Last rolls</div>
                <div class="history" id="rouletteHistory"></div>
              </aside>

              <div class="roulette-stage-wrap">
                <div class="roulette-wheel">
                  <div class="wheel-ball" id="wheelBall" aria-hidden="true"></div>
                  <div class="wheel-rotor" id="wheelRotor">
                    <div class="wheel-ring" id="wheelRing"></div>
                    <div class="wheel-labels" id="wheelLabels"></div>
                  </div>
                  <div class="wheel-hub" aria-hidden="true"></div>
                </div>

                <div class="roulette-table-wrap">
                  <div class="roulette-table" id="rouletteTable" aria-label="Roulette betting table"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section id="minesView" class="view">
          <div class="mines-layout">
            <div class="mines-panel">
              <div class="mode-pill">
                <button id="minesManualTab" type="button" class="mode active">Manual</button>
                <button type="button" class="mode" disabled>Auto</button>
              </div>

              <div class="panel-block">
                <div class="label-row">
                  <div class="lbl">Bet amount</div>
                  <div class="muted">Coins</div>
                </div>
                <div class="betbox">
                  <input id="minesBetInput" inputmode="numeric" value="100" />
                  <div class="bet-actions">
                    <button id="minesBetHalf" class="chip" type="button">1/2</button>
                    <button id="minesBetDouble" class="chip" type="button">2x</button>
                  </div>
                </div>
              </div>

              <div class="panel-block">
                <div class="lbl">Grid size</div>
                <div class="stepper mini" aria-label="Mines grid size">
                  <button id="minesSizeMinus" type="button">-</button>
                  <div class="value" id="minesSizeValue">5x5</div>
                  <button id="minesSizePlus" type="button">+</button>
                </div>
              </div>

              <div class="panel-block">
                <div class="lbl">Mines</div>
                <div class="stepper mini" aria-label="Mines count">
                  <button id="minesMinesMinus" type="button">-</button>
                  <div class="value" id="minesMinesCtrlValue">4</div>
                  <button id="minesMinesPlus" type="button">+</button>
                </div>
                <div class="muted tiny" id="minesMinesHint" style="margin-top:6px;"></div>
              </div>

              <button id="minesStartBtn" class="primary-wide" type="button">Bet</button>
              <div class="msg" id="minesMsg"></div>

              <div class="mines-bottom">
                <div class="minirow">
                  <div class="muted">Multiplier</div>
                  <div class="strong" id="minesMultValue">1.00x</div>
                </div>
                <div class="minirow">
                  <div class="muted">Profit</div>
                  <div class="strong" id="minesProfitValue">0</div>
                </div>
                <button id="minesCashoutBtn" class="secondary-wide" type="button" disabled>Cash out</button>
              </div>
            </div>

            <div class="mines-board">
              <div class="board-top">
                <div class="muted">Opened: <b id="minesOpenedValue">0</b></div>
                <div class="muted">Mines: <b id="minesMinesValue">4</b></div>
              </div>
              <div class="mines-grid stake" id="minesGrid"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="/supabase-config.js"></script>
    <script src="./supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./supabase.js"></script>
    <script src="./maintenance.js"></script>
    <script src="./site.js"></script>
  </body>
</html>
