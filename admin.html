<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0b1020; color: #e9edf7; }
      header { position: sticky; top: 0; background: rgba(11,16,32,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.12); }
      .wrap { max-width: 980px; margin: 0 auto; padding: 18px 16px; }
      .row { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
      .muted { color: rgba(233, 237, 247, 0.7); font-size: 13px; }
      button { cursor: pointer; border: 0; padding: 10px 12px; border-radius: 10px; background: #33d18f; color: #07110c; font-weight: 800; }
      button.secondary { background: rgba(255,255,255,0.08); color: #e9edf7; border: 1px solid rgba(255,255,255,0.14); }
      input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: #e9edf7; }
      input:focus { outline: none; border-color: rgba(125, 211, 252, 0.55); box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.14); }
      table { width: 100%; border-collapse: collapse; margin-top: 14px; }
      th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.10); vertical-align: middle; }
      th { font-size: 12px; color: rgba(233,237,247,0.65); font-weight: 700; }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 6px; }
      .pill { display: inline-block; padding: 4px 8px; border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; font-size: 12px; }
      .err { color: #ff6b6b; }
      .ok { color: #33d18f; }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="row">
          <div>
            <h2 style="margin:0 0 4px;">Admin panel</h2>
            <div class="muted">Users from <code>public.profiles</code> and editing <code>balance</code>.</div>
          </div>
          <div class="row" style="justify-content:flex-end;">
            <button id="refreshBtn" class="secondary" type="button">Refresh</button>
            <button
              id="backfillBtn"
              class="secondary"
              type="button"
              title="Создать отсутствующие строки в public.profiles из auth.users (нужна RPC-функция admin_backfill_profiles)"
            >
              Backfill
            </button>
            <button id="logoutBtn" type="button">Logout</button>
          </div>
        </div>
        <div style="margin-top:12px;">
          <input id="search" placeholder="Search by email or UUID..." />
          <div id="status" class="muted" style="margin-top:8px;"></div>
        </div>

        <div style="margin-top:14px; border-top: 1px solid rgba(255,255,255,0.10); padding-top: 14px;">
          <div class="row" style="align-items:flex-end;">
            <div style="flex:1 1 auto;">
              <div class="muted" style="font-weight:700; color: rgba(233,237,247,0.85);">Maintenance mode</div>
              <div class="muted">Blocks the game for everyone except admins.</div>
            </div>
            <label class="pill" style="display:flex; gap:10px; align-items:center;">
              <input id="maintEnabled" type="checkbox" style="width:auto; margin:0;" />
              Enabled
            </label>
          </div>
          <div style="margin-top:10px;">
            <input id="maintMessage" placeholder="Message shown to users (e.g. Technical works)..." />
          </div>
          <div class="row" style="justify-content:flex-start; margin-top:10px;">
            <button id="maintSaveBtn" class="secondary" type="button">Save maintenance</button>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Balance</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </main>

    <script src="/supabase-config.js"></script>
    <script src="./supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./supabase.js"></script>
    <script src="./maintenance.js"></script>
    <script>
      (async () => {
        const sb = window.sb;
        if (!sb) {
          window.location.href = "./index.html";
          return;
        }

        if (window.maintenanceGuard) {
          const blocked = await window.maintenanceGuard(sb);
          if (blocked) return;
        }

        const statusEl = document.getElementById("status");
        const rowsEl = document.getElementById("rows");
        const searchEl = document.getElementById("search");
        const refreshBtn = document.getElementById("refreshBtn");
        const backfillBtn = document.getElementById("backfillBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const maintEnabledEl = document.getElementById("maintEnabled");
        const maintMessageEl = document.getElementById("maintMessage");
        const maintSaveBtn = document.getElementById("maintSaveBtn");

        function setStatus(text, kind = "muted") {
          statusEl.textContent = text;
          statusEl.className = kind === "err" ? "muted err" : kind === "ok" ? "muted ok" : "muted";
        }

        const { data } = await sb.auth.getSession();
        if (!data.session) {
          window.location.href = "./index.html";
          return;
        }

        const { data: isAdmin, error: adminErr } = await sb.rpc("is_admin");
        if (adminErr) {
          setStatus(`is_admin error: ${adminErr.message}`, "err");
          return;
        }
        if (!isAdmin) {
          setStatus("No access. Add yourself to public.admins (SQL Editor).", "err");
          rowsEl.innerHTML = "";
          return;
        }

          setStatus("OK: admin", "ok");

        async function loadMaintenance() {
          const { data, error } = await sb.from("app_settings").select("value").eq("key", "maintenance").maybeSingle();
          if (error) {
            setStatus(`Maintenance load error: ${error.message}`, "err");
            return;
          }
          const v = data?.value || {};
          maintEnabledEl.checked = Boolean(v.enabled);
          maintMessageEl.value = String(v.message || "");
        }

        async function saveMaintenance() {
          maintSaveBtn.disabled = true;
          const value = { enabled: Boolean(maintEnabledEl.checked), message: String(maintMessageEl.value || "") };
          const { error } = await sb.from("app_settings").upsert({ key: "maintenance", value }, { onConflict: "key" });
          maintSaveBtn.disabled = false;
          if (error) return setStatus(`Maintenance save error: ${error.message}`, "err");
          setStatus(value.enabled ? "Maintenance enabled" : "Maintenance disabled", "ok");
        }

        let all = [];

        function render() {
          const q = searchEl.value.trim().toLowerCase();
          const list = q
            ? all.filter((p) => String(p.id).toLowerCase().includes(q) || String(p.email).toLowerCase().includes(q))
            : all;

          rowsEl.innerHTML = "";
          for (const p of list) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td><code>${p.id}</code></td>
              <td>${p.email || "-"}</td>
              <td>
                <input data-id="${p.id}" class="bal" type="number" step="1" value="${Number(p.balance ?? 0)}" />
              </td>
              <td><span class="pill">${p.created_at ? new Date(p.created_at).toLocaleString() : "-"}</span></td>
              <td><button data-id="${p.id}" class="save" type="button">Save</button></td>
            `;
            rowsEl.appendChild(tr);
          }
        }

        async function load() {
          setStatus("Loading users...");
          const { data, error } = await sb
            .from("profiles")
            .select("id,email,balance,created_at")
            .order("created_at", { ascending: false });

          if (error) {
            const msg = error.message || "";
            if (msg.includes("column") && msg.includes("balance") && msg.includes("does not exist")) {
              setStatus("Missing balance column. Run SQL: ALTER TABLE public.profiles ADD COLUMN balance bigint NOT NULL DEFAULT 5000;", "err");
            } else {
              setStatus(`Load error: ${msg}`, "err");
            }
            return;
          }
          all = data || [];
          if (!all.length) {
            setStatus(
              "Users: 0. Если аккаунты есть в auth.users, но profiles пустая — запустите Backfill (или выполните SQL backfill).",
              "err",
            );
          } else {
            setStatus(`Users: ${all.length}`, "ok");
          }
          render();
        }

        backfillBtn.addEventListener("click", async () => {
          backfillBtn.disabled = true;
          setStatus("Backfill running...");
          const { data, error } = await sb.rpc("admin_backfill_profiles");
          backfillBtn.disabled = false;
          if (error) return setStatus(`Backfill error: ${error.message}`, "err");
          setStatus(`Backfill OK. Inserted: ${Number(data || 0)}`, "ok");
          await load();
        });

        rowsEl.addEventListener("click", async (e) => {
          const btn = e.target?.closest?.("button.save");
          if (!btn) return;
          const id = btn.getAttribute("data-id");
          const input = rowsEl.querySelector(`input.bal[data-id="${id}"]`);
          const balance = Number(input?.value ?? 0);
          if (!Number.isFinite(balance) || balance < 0) return setStatus("Balance must be a number >= 0", "err");

          btn.disabled = true;
          const { error } = await sb.from("profiles").update({ balance }).eq("id", id);
          btn.disabled = false;

          if (error) return setStatus(`Update error: ${error.message}`, "err");
          setStatus("Saved", "ok");
          const idx = all.findIndex((x) => x.id === id);
          if (idx >= 0) all[idx].balance = balance;
        });

        searchEl.addEventListener("input", render);
        refreshBtn.addEventListener("click", load);
        maintSaveBtn.addEventListener("click", saveMaintenance);
        logoutBtn.addEventListener("click", async () => {
          await sb.auth.signOut();
          window.location.href = "./index.html";
        });

        await loadMaintenance();
        await load();
      })();
    </script>
  </body>
</html>
