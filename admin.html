<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background:
          radial-gradient(1100px 680px at 18% 0%, rgba(168,85,255,0.22), transparent 60%),
          radial-gradient(980px 640px at 90% 10%, rgba(0,234,255,0.14), transparent 55%),
          linear-gradient(180deg, #0b0014, #140028 52%, #1a0033);
        color: rgba(245,246,255,0.92);
      }
      header { position: sticky; top: 0; background: rgba(12,0,24,0.74); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(255,255,255,0.10); box-shadow: 0 20px 70px rgba(0,0,0,0.44); }
      .wrap { max-width: 980px; margin: 0 auto; padding: 18px 16px; }
      .row { display: flex; gap: 12px; align-items: center; justify-content: space-between; }
      .muted { color: rgba(245,246,255,0.66); font-size: 13px; }
      button {
        cursor: pointer;
        border: 0;
        padding: 10px 12px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(168,85,255,0.98), rgba(124,58,237,0.96));
        color: rgba(255,255,255,0.96);
        font-weight: 1000;
        box-shadow: 0 18px 60px rgba(168,85,255,0.16);
        transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
      }
      button:hover { filter: brightness(1.05); transform: translateY(-1px); }
      button:active { transform: translateY(0); }
      button.secondary { background: rgba(255,255,255,0.06); color: rgba(245,246,255,0.92); border: 1px solid rgba(255,255,255,0.14); box-shadow: none; }
      button.secondary:hover { box-shadow: 0 0 0 1px rgba(0,234,255,0.14), 0 0 40px rgba(0,234,255,0.10); border-color: rgba(0,234,255,0.22); transform: translateY(-1px); }
      input { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color: rgba(245,246,255,0.92); font-weight: 800; }
      input:focus { outline: none; border-color: rgba(0,234,255,0.45); box-shadow: 0 0 0 3px rgba(0,234,255,0.14); }
      table { width: 100%; border-collapse: collapse; margin-top: 14px; }
      th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.10); vertical-align: middle; }
      th { font-size: 12px; color: rgba(233,237,247,0.65); font-weight: 700; }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.10); }
      .pill { display: inline-block; padding: 4px 8px; border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; font-size: 12px; background: rgba(255,255,255,0.04); }
      .err { color: #ff3b3b; }
      .ok { color: #00ff88; }
      .settings-panel { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 240ms ease, opacity 180ms ease; }
      .settings-panel.open { max-height: 520px; opacity: 1; }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="row">
          <div>
            <h2 style="margin:0 0 4px;">Admin panel</h2>
            <div class="muted">Users from <code>public.profiles</code> and editing <code>balance</code>.</div>
          </div>
          <div class="row" style="justify-content:flex-end;">
            <button id="refreshBtn" class="secondary" type="button">Refresh</button>
            <button
              id="backfillBtn"
              class="secondary"
              type="button"
              title="Create missing rows in public.profiles from auth.users (requires RPC admin_backfill_profiles)"
            >
              Backfill
            </button>
            <button id="logoutBtn" type="button">Logout</button>
          </div>
        </div>
        <div style="margin-top:12px;">
          <input id="search" placeholder="Search by email or UUID..." />
          <div id="status" class="muted" style="margin-top:8px;"></div>
        </div>

        <div style="margin-top:14px; border-top: 1px solid rgba(255,255,255,0.10); padding-top: 14px;">
          <div class="row" style="align-items:center;">
            <div class="muted" style="font-weight:700; color: rgba(233,237,247,0.85);">Site controls</div>
            <button id="settingsToggle" class="secondary" type="button" style="padding:8px 12px;">Settings</button>
          </div>
          <div id="settingsPanel" class="settings-panel" style="margin-top:12px;">
            <div style="border-top: 1px solid rgba(255,255,255,0.10); padding-top: 14px;">
              <div class="row" style="align-items:flex-end;">
                <div style="flex:1 1 auto;">
                  <div class="muted" style="font-weight:700; color: rgba(233,237,247,0.85);">Maintenance mode</div>
                  <div class="muted">Blocks the game for everyone except admins.</div>
                </div>
                <label class="pill" style="display:flex; gap:10px; align-items:center;">
                  <input id="maintEnabled" type="checkbox" style="width:auto; margin:0;" />
                  Enabled
                </label>
              </div>
              <div style="margin-top:10px;">
                <input id="maintMessage" placeholder="Message shown to users (e.g. Technical works)..." />
              </div>
              <div class="row" style="justify-content:flex-start; margin-top:10px;">
                <button id="maintSaveBtn" class="secondary" type="button">Save maintenance</button>
              </div>
            </div>

            <div style="margin-top:14px; border-top: 1px solid rgba(255,255,255,0.10); padding-top: 14px;">
              <div class="row" style="align-items:flex-end;">
                <div style="flex:1 1 auto;">
                  <div class="muted" style="font-weight:700; color: rgba(233,237,247,0.85);">Blackjack lock</div>
                  <div class="muted">Blocks only the Blackjack tab for everyone except admins.</div>
                </div>
                <label class="pill" style="display:flex; gap:10px; align-items:center;">
                  <input id="bjLockEnabled" type="checkbox" style="width:auto; margin:0;" />
                  Enabled
                </label>
              </div>
              <div style="margin-top:10px;">
                <input id="bjLockMessage" placeholder="Optional message for users..." />
              </div>
              <div class="row" style="justify-content:flex-start; margin-top:10px;">
                <button id="bjLockSaveBtn" class="secondary" type="button">Save blackjack lock</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Balance</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </main>

    <script src="/supabase-config.js"></script>
    <script src="./supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="./supabase.js"></script>
    <script src="./maintenance.js"></script>
    <script>
      (async () => {
        const sb = window.sb;
        if (!sb) {
          window.location.href = "./index.html";
          return;
        }

        if (window.maintenanceGuard) {
          const blocked = await window.maintenanceGuard(sb);
          if (blocked) return;
        }

        const statusEl = document.getElementById("status");
        const rowsEl = document.getElementById("rows");
        const searchEl = document.getElementById("search");
        const refreshBtn = document.getElementById("refreshBtn");
        const backfillBtn = document.getElementById("backfillBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const maintEnabledEl = document.getElementById("maintEnabled");
        const maintMessageEl = document.getElementById("maintMessage");
        const maintSaveBtn = document.getElementById("maintSaveBtn");
        const bjLockEnabledEl = document.getElementById("bjLockEnabled");
        const bjLockMessageEl = document.getElementById("bjLockMessage");
        const bjLockSaveBtn = document.getElementById("bjLockSaveBtn");
        const settingsToggle = document.getElementById("settingsToggle");
        const settingsPanel = document.getElementById("settingsPanel");

        settingsToggle?.addEventListener("click", () => {
          settingsPanel?.classList.toggle("open");
        });

        function setStatus(text, kind = "muted") {
          statusEl.textContent = text;
          statusEl.className = kind === "err" ? "muted err" : kind === "ok" ? "muted ok" : "muted";
        }

        const { data } = await sb.auth.getSession();
        if (!data.session) {
          window.location.href = "./index.html";
          return;
        }

        const { data: isAdmin, error: adminErr } = await sb.rpc("is_admin");
        if (adminErr) {
          setStatus(`is_admin error: ${adminErr.message}`, "err");
          return;
        }
        if (!isAdmin) {
          setStatus("No access. Add yourself to public.admins (SQL Editor).", "err");
          rowsEl.innerHTML = "";
          return;
        }

          setStatus("OK: admin", "ok");

        async function loadMaintenance() {
          const { data, error } = await sb.from("app_settings").select("value").eq("key", "maintenance").maybeSingle();
          if (error) {
            setStatus(`Maintenance load error: ${error.message}`, "err");
            return;
          }
          const v = data?.value || {};
          maintEnabledEl.checked = Boolean(v.enabled);
          maintMessageEl.value = String(v.message || "");
        }

        async function saveMaintenance() {
          maintSaveBtn.disabled = true;
          const value = { enabled: Boolean(maintEnabledEl.checked), message: String(maintMessageEl.value || "") };
          const { error } = await sb.from("app_settings").upsert({ key: "maintenance", value }, { onConflict: "key" });
          maintSaveBtn.disabled = false;
          if (error) return setStatus(`Maintenance save error: ${error.message}`, "err");
          setStatus(value.enabled ? "Maintenance enabled" : "Maintenance disabled", "ok");
        }

        async function loadBlackjackLock() {
          const { data, error } = await sb.from("app_settings").select("value").eq("key", "blackjack_lock").maybeSingle();
          if (error) {
            setStatus(`Blackjack lock load error: ${error.message}`, "err");
            return;
          }
          const v = data?.value || {};
          bjLockEnabledEl.checked = Boolean(v.enabled);
          bjLockMessageEl.value = String(v.message || "");
        }

        async function saveBlackjackLock() {
          bjLockSaveBtn.disabled = true;
          const value = { enabled: Boolean(bjLockEnabledEl.checked), message: String(bjLockMessageEl.value || "") };
          const { error } = await sb.from("app_settings").upsert({ key: "blackjack_lock", value }, { onConflict: "key" });
          bjLockSaveBtn.disabled = false;
          if (error) return setStatus(`Blackjack lock save error: ${error.message}`, "err");
          setStatus(value.enabled ? "Blackjack locked" : "Blackjack unlocked", "ok");
        }

        let all = [];

        function render() {
          const q = searchEl.value.trim().toLowerCase();
          const list = q
            ? all.filter((p) => String(p.id).toLowerCase().includes(q) || String(p.email).toLowerCase().includes(q))
            : all;

          rowsEl.innerHTML = "";
          for (const p of list) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td><code>${p.id}</code></td>
              <td>${p.email || "-"}</td>
              <td>
                <input data-id="${p.id}" class="bal" type="number" step="1" value="${Number(p.balance ?? 0)}" />
              </td>
              <td><span class="pill">${p.created_at ? new Date(p.created_at).toLocaleString() : "-"}</span></td>
              <td><button data-id="${p.id}" class="save" type="button">Save</button></td>
            `;
            rowsEl.appendChild(tr);
          }
        }

        async function load() {
          setStatus("Loading users...");
          const { data, error } = await sb
            .from("profiles")
            .select("id,email,balance,created_at")
            .order("created_at", { ascending: false });

          if (error) {
            const msg = error.message || "";
            if (msg.includes("column") && msg.includes("balance") && msg.includes("does not exist")) {
              setStatus("Missing balance column. Run SQL: ALTER TABLE public.profiles ADD COLUMN balance bigint NOT NULL DEFAULT 5000;", "err");
            } else {
              setStatus(`Load error: ${msg}`, "err");
            }
            return;
          }
          all = data || [];
          if (!all.length) {
            setStatus(
              "Users: 0. If accounts exist in auth.users but profiles is empty, run Backfill (or execute the SQL backfill).",
              "err",
            );
          } else {
            setStatus(`Users: ${all.length}`, "ok");
          }
          render();
        }

        backfillBtn.addEventListener("click", async () => {
          backfillBtn.disabled = true;
          setStatus("Backfill running...");
          const { data, error } = await sb.rpc("admin_backfill_profiles");
          backfillBtn.disabled = false;
          if (error) return setStatus(`Backfill error: ${error.message}`, "err");
          setStatus(`Backfill OK. Inserted: ${Number(data || 0)}`, "ok");
          await load();
        });

        rowsEl.addEventListener("click", async (e) => {
          const btn = e.target?.closest?.("button.save");
          if (!btn) return;
          const id = btn.getAttribute("data-id");
          const input = rowsEl.querySelector(`input.bal[data-id="${id}"]`);
          const balance = Number(input?.value ?? 0);
          if (!Number.isFinite(balance) || balance < 0) return setStatus("Balance must be a number >= 0", "err");

          btn.disabled = true;
          const { error } = await sb.from("profiles").update({ balance }).eq("id", id);
          btn.disabled = false;

          if (error) return setStatus(`Update error: ${error.message}`, "err");

          // Keep localStorage in sync for the same browser (site.js uses localStorage as source of truth).
          try {
            localStorage.setItem(`casino_balance_v1:${id}`, String(Math.max(0, Math.floor(balance))));
          } catch {}

          setStatus("Saved", "ok");
          const idx = all.findIndex((x) => x.id === id);
          if (idx >= 0) all[idx].balance = balance;
        });

        searchEl.addEventListener("input", render);
        refreshBtn.addEventListener("click", load);
        maintSaveBtn.addEventListener("click", saveMaintenance);
        bjLockSaveBtn.addEventListener("click", saveBlackjackLock);
        logoutBtn.addEventListener("click", async () => {
          await sb.auth.signOut();
          window.location.href = "./index.html";
        });

        await loadMaintenance();
        await loadBlackjackLock();
        await load();
      })();
    </script>
  </body>
</html>
