<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background:
          radial-gradient(1100px 680px at 18% 0%, rgba(168,85,255,0.22), transparent 60%),
          radial-gradient(980px 640px at 90% 10%, rgba(0,234,255,0.14), transparent 55%),
          linear-gradient(180deg, #0b0014, #140028 52%, #1a0033);
        color: rgba(245,246,255,0.92);
      }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card {
        width: min(520px, 100%);
        background: linear-gradient(180deg, rgba(16,0,34,0.70), rgba(10,0,24,0.56));
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 18px;
        padding: 22px;
        box-shadow: 0 26px 80px rgba(0,0,0,0.62), 0 0 0 1px rgba(168,85,255,0.12);
        backdrop-filter: blur(14px);
      }
      .row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
      button {
        cursor: pointer;
        border: 0;
        padding: 10px 14px;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(168,85,255,0.98), rgba(124,58,237,0.96));
        color: rgba(255,255,255,0.96);
        font-weight: 1000;
        box-shadow: 0 18px 60px rgba(168,85,255,0.16);
        transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
      }
      button:hover { filter: brightness(1.05); transform: translateY(-1px); }
      button:active { transform: translateY(0); }
      .muted { color: rgba(245,246,255,0.66); font-size: 14px; }
      code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.10); }
      a { color: #00eaff; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="row">
          <div>
            <h2 style="margin:0 0 6px;">You are logged in</h2>
            <div class="muted">This page is protected: you need a session.</div>
          </div>
          <div class="row" style="justify-content:flex-end;">
            <button id="toSiteBtn" style="background: rgba(255,255,255,0.08); color:#e9edf7; border: 1px solid rgba(255,255,255,0.14);">Go to site</button>
            <button id="logoutBtn">Logout</button>
          </div>
        </div>
        <hr style="border:0;border-top:1px solid rgba(255,255,255,0.12);margin:18px 0;">
        <div class="muted">Email:</div>
        <div id="email" style="margin:6px 0 14px; font-size: 16px;"></div>
        <div class="muted">User ID:</div>
        <div><code id="userId"></code></div>

        <div style="margin-top:16px;" class="muted">Nickname (for leaderboard):</div>
        <div style="display:flex; gap:10px; align-items:center; margin-top:8px; flex-wrap:wrap;">
          <input id="nick" placeholder="Your nickname..." style="flex:1 1 240px; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.04); color:#e9edf7;" />
          <button id="saveNickBtn" style="background: rgba(255,255,255,0.08); color:#e9edf7; border: 1px solid rgba(255,255,255,0.14);">Save</button>
        </div>
        <div class="muted" id="nickMsg" style="margin-top:8px;"></div>
        <div style="margin-top:14px;" class="muted">Profile row (public.profiles):</div>
        <div class="muted" id="profileStatus" style="margin-top:6px;"></div>
        <div style="margin-top:18px;" class="muted">
          Back to the <a href="./index.html">login page</a>.
        </div>
      </div>
    </div>

    <!-- Local (node server.js): /supabase-config.js from .env. On Vercel it can be 404 (ok). -->
    <script src="/supabase-config.js"></script>
    <!-- For Vercel/static: put keys into supabase-config.js -->
    <script src="./supabase-config.js"></script>
    <!-- Supabase JS SDK (UMD) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <!-- Creates window.sb -->
    <script src="./supabase.js"></script>
    <script src="./maintenance.js"></script>
    <script>
      (async () => {
        const sb = window.sb;
        if (!sb) {
          window.location.href = "./index.html";
          return;
        }

        if (window.maintenanceGuard) {
          const blocked = await window.maintenanceGuard(sb);
          if (blocked) return;
        }

        const { data } = await sb.auth.getSession();
        if (!data.session) {
          window.location.href = "./index.html";
          return;
        }

        const user = data.session.user;
        document.getElementById("email").textContent = user.email || "-";
        document.getElementById("userId").textContent = user.id;

        const profileStatus = document.getElementById("profileStatus");
        const nickEl = document.getElementById("nick");
        const nickMsg = document.getElementById("nickMsg");
        const saveNickBtn = document.getElementById("saveNickBtn");
        try {
          const { data: profile, error } = await sb
            .from("profiles")
            .select("id,email,created_at,balance,username")
            .eq("id", user.id)
            .maybeSingle();

          if (error) throw error;
          if (!profile) {
            profileStatus.textContent = "Not found. Run the SQL from SUPABASE_SETUP.sql (profiles + trigger), then refresh.";
          } else {
            profileStatus.textContent = `OK: ${profile.email} | username=${profile.username || "-"} | balance=${profile.balance} | ${profile.created_at}`;
            nickEl.value = profile.username || "";
          }
        } catch (e) {
          const msg = e?.message || "";
          if (msg.includes("column") && msg.includes("balance") && msg.includes("does not exist")) {
            profileStatus.textContent =
              "Missing balance column. Run in Supabase SQL Editor: ALTER TABLE public.profiles ADD COLUMN balance bigint NOT NULL DEFAULT 5000;";
          } else {
            profileStatus.textContent = msg ? `Profiles error: ${msg}` : "Profiles error";
          }
        }

        function setNickMsg(t) {
          nickMsg.textContent = t || "";
        }

        saveNickBtn.addEventListener("click", async () => {
          const username = String(nickEl.value || "").trim().slice(0, 24);
          if (!username) return setNickMsg("Enter a nickname (1-24 chars).");
          saveNickBtn.disabled = true;
          const { error } = await sb.from("profiles").update({ username }).eq("id", user.id);
          saveNickBtn.disabled = false;
          if (error) return setNickMsg(`Save error: ${error.message}`);
          setNickMsg("Saved. You should appear in the leaderboard.");
        });

        document.getElementById("toSiteBtn").addEventListener("click", () => {
          window.location.href = "./site.html";
        });

        document.getElementById("logoutBtn").addEventListener("click", async () => {
          await sb.auth.signOut();
          window.location.href = "./index.html";
        });

        sb.auth.onAuthStateChange((_event, session) => {
          if (!session) window.location.href = "./index.html";
        });
      })();
    </script>
  </body>
</html>
